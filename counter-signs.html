<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cuppa Lumpia | Counter QR Sign</title>
<meta name="description" content="Print-ready counter sign for Cuppa Lumpia: a QR to order ahead and join the drop list. 5×7 and 4×6 sizes." />
<link rel="canonical" href="https://cuppalumpia.com/counter-signs.html" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Cuppa Lumpia" />
<meta property="og:title" content="Cuppa Lumpia | Counter QR Sign" />
<meta property="og:description" content="Print-ready counter sign for Cuppa Lumpia: a QR to order ahead and join the drop list. 5×7 and 4×6 sizes." />
<meta property="og:url" content="https://cuppalumpia.com/counter-signs.html" />
<meta property="og:image" content="https://cuppalumpia.com/og-image.png?v=2" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Cuppa Lumpia logo, order ahead at cuppalumpia.com" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Cuppa Lumpia | Counter QR Sign" />
<meta name="twitter:description" content="Print-ready counter sign for Cuppa Lumpia: a QR to order ahead and join the drop list. 5×7 and 4×6 sizes." />
<meta name="twitter:image" content="https://cuppalumpia.com/og-image.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Zilla+Slab:wght@500;600;700&family=Oswald:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
<style>
  :root{
    --esp:#141009; --cream:#F4EFE3; --kraft:#F1E8D6; --gold:#E7A11D; --gold-deep:#B27A12;
    --ink:#241606; --sub:#7a5310; --soft:#d8cdba;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:#0c0905; min-height:100vh; font-family:'Lora',serif; -webkit-font-smoothing:antialiased; }
  body{ display:flex; flex-direction:column; align-items:center; gap:18px; padding:42px 0 64px; }

  .toolbar{ display:flex; align-items:center; gap:10px; }
  .toolbar .lab{ font-family:'Oswald',sans-serif; font-weight:600; font-size:11px; letter-spacing:0.22em;
    text-transform:uppercase; color:#8a7c66; margin-right:4px; }
  .toolbar button{ font-family:'Oswald',sans-serif; font-weight:600; font-size:11.5px; letter-spacing:0.16em;
    text-transform:uppercase; cursor:pointer; padding:9px 16px; border:1px solid rgba(244,239,227,0.18);
    background:transparent; color:var(--cream); border-radius:7px; transition:all .18s; }
  .toolbar button:hover{ border-color:var(--gold); color:var(--gold); }
  .toolbar button.on{ background:var(--gold); border-color:var(--gold); color:#241606; }

  .scaler{ position:relative; }

  /* ---- the sign: drawn at 500 x 700 (100px per inch, 5x7) ---- */
  .sign{ width:500px; height:700px; position:relative; overflow:hidden;
    background:var(--gold); color:var(--ink); display:flex; flex-direction:column;
    transform-origin:top left; box-shadow:0 30px 80px rgba(0,0,0,0.55); }
  .sign::after{ content:''; position:absolute; inset:0; border:1px solid rgba(0,0,0,0.22); pointer-events:none; }
  /* subtle hairline keyline inset, like the printed pieces */
  .keyline{ position:absolute; inset:18px; border:1.5px solid rgba(36,22,6,0.30); border-radius:6px; pointer-events:none; }

  /* CTA header bar */
  .cta{ background:var(--esp); color:var(--cream); text-align:center;
    padding:34px 36px 30px; }
  .cta .kicker{ font-family:'Oswald',sans-serif; font-weight:600; font-size:13px; letter-spacing:0.26em;
    text-transform:uppercase; color:var(--gold); }
  .cta .head{ font-family:'Zilla Slab',serif; font-weight:700; font-size:46px; line-height:0.98;
    letter-spacing:0.01em; text-transform:uppercase; margin-top:12px; color:var(--cream); }

  /* QR stage on the gold field */
  .stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:30px 36px 8px; }
  .qrplate{ background:#fff; padding:18px; border-radius:14px; line-height:0;
    box-shadow:0 12px 30px rgba(36,22,6,0.30); }
  .qrplate canvas, .qrplate svg{ width:230px !important; height:230px !important; display:block; }
  .scanline{ font-family:'Lora',serif; font-style:italic; font-size:19px; color:var(--ink); text-align:center; }
  .scanline b{ font-style:normal; font-family:'Oswald',sans-serif; font-weight:600; font-size:16px;
    letter-spacing:0.04em; text-transform:uppercase; color:var(--sub); display:block; margin-top:4px; }

  /* brand lockup footer */
  .foot{ text-align:center; padding:30px 36px 38px; }
  .lock{ display:flex; flex-direction:column; align-items:center; line-height:0.8; }
  .lock .c{ font-family:'Yellowtail',cursive; font-size:30px; transform:rotate(-3deg); color:var(--ink);
    margin-left:0.12em; }
  .lock .l{ font-family:'Zilla Slab',serif; font-weight:700; letter-spacing:0.02em; font-size:48px;
    color:var(--ink); margin-top:3px; }
  .url{ font-family:'Oswald',sans-serif; font-weight:600; font-size:15px; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--esp); margin-top:20px;
    border-top:1px solid rgba(36,22,6,0.28); padding-top:18px; display:inline-block; }

  .hint{ font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.16em;
    text-transform:uppercase; color:#5f5443; margin-top:6px; }

  /* ---------- print: one sign per page, true size ---------- */
  @media print{
    @page{ margin:0; }
    html,body{ background:#fff; }
    body{ padding:0; gap:0; }
    .toolbar, .hint{ display:none !important; }
    .scaler{ width:auto !important; height:auto !important; }
    .sign{ transform:none !important; box-shadow:none !important;
      width:var(--pw); height:var(--ph); }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <span class="lab">Goal</span>
    <button data-variant="order" class="on">Order ahead</button>
    <button data-variant="drop">Join drop list</button>
    <button data-variant="frozen">Frozen dozens</button>
    <button data-variant="menu">Menu &amp; hours</button>
  </div>
  <div class="toolbar">
    <span class="lab">Sign size</span>
    <button data-size="5x7" class="on">5 × 7 in</button>
    <button data-size="4x6">4 × 6 in</button>
    <button id="printBtn">Print</button>
  </div>

  <div class="scaler" id="scaler">
    <div class="sign" id="sign">
      <div class="keyline"></div>
      <div class="cta">
        <div class="kicker" id="kicker">Fried fresh to order</div>
        <div class="head" id="head">Scan to<br>Order Ahead</div>
      </div>
      <div class="stage">
        <div class="qrplate"><div id="qr"></div></div>
        <div class="scanline" id="payoff">Beat the line next time — order before you come.<b id="payoffSub">Point your camera here</b></div>
      </div>
      <div class="foot">
        <div class="lock"><span class="c">Cuppa</span><span class="l">LUMPIA</span></div>
        <div class="url" id="url">cuppalumpia.com</div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">Cuppa Lumpia · counter QR sign · 5 × 7 in portrait · print at 100%</div>

<script>
  // QR — high contrast (espresso on pure white), spiral mark center, gold corner dots. Level H.
  new QRCodeStyling({
    width:690, height:690, type:'canvas', data:'https://cuppalumpia.com', margin:8,
    qrOptions:{ errorCorrectionLevel:'H' },
    dotsOptions:{ type:'rounded', color:'#241606' },
    backgroundOptions:{ color:'#ffffff' },
    cornersSquareOptions:{ type:'square', color:'#241606' },
    cornersDotOptions:{ type:'square', color:'#B27A12' },
    image:'favicon-512.png',
    imageOptions:{ hideBackgroundDots:true, imageSize:0.22, margin:7 }
  }).append(document.getElementById('qr'));

  const sign = document.getElementById('sign');
  const scaler = document.getElementById('scaler');
  const hint = document.getElementById('hint');

  // Each variant = one sharp CTA matched to one moment at the counter, with a concrete payoff.
  const VARIANTS = {
    order:  { kicker:'Fried fresh to order',          head:'Scan to<br>Order Ahead',   payoff:'Beat the line next time. Order before you arrive.', sub:'',  tag:'order ahead' },
    drop:   { kicker:'Weekends 11\u20132 \u00b7 til we sell out', head:'Join the<br>Drop List',  payoff:'Be first to know when the batch drops.', sub:'',    tag:'drop list' },
    frozen: { kicker:'Available now \u00b7 fry at home',   head:'Frozen by<br>the Dozen',   payoff:'Take the crunch home, fry fresh anytime.', sub:'',    tag:'frozen dozens' },
    menu:   { kicker:'Family recipe \u00b7 fried to order',head:'See the<br>Full Menu',    payoff:'What\u2019s frying this weekend, plus hours.', sub:'', tag:'menu & hours' }
  };
  let variant = 'order';

  function applyVariant(key){
    variant = key;
    const v = VARIANTS[key];
    document.getElementById('kicker').innerHTML = v.kicker;
    document.getElementById('head').innerHTML = v.head;
    document.getElementById('payoff').firstChild.textContent = v.payoff;
    const sub = document.getElementById('payoffSub');
    sub.innerHTML = v.sub;
    sub.style.display = v.sub ? '' : 'none';
    document.querySelectorAll('[data-variant]').forEach(b => b.classList.toggle('on', b.dataset.variant === key));
    updateHint();
  }

  const SIZES = {
    '5x7':{ w:500, h:700, pw:'5in', ph:'7in', label:'5 \u00d7 7 in portrait' },
    '4x6':{ w:480, h:720, pw:'4in', ph:'6in', label:'4 \u00d7 6 in portrait' }
  };
  let current = '5x7';

  function updateHint(){
    const s = SIZES[current];
    hint.textContent = 'Cuppa Lumpia \u00b7 counter QR sign \u00b7 ' + VARIANTS[variant].tag + ' \u00b7 ' + s.label + ' \u00b7 print at 100%';
  }

  function applySize(key){
    current = key;
    const s = SIZES[key];
    sign.style.width = s.w + 'px';
    sign.style.height = s.h + 'px';
    sign.style.setProperty('--pw', s.pw);
    sign.style.setProperty('--ph', s.ph);
    document.querySelectorAll('[data-size]').forEach(b => b.classList.toggle('on', b.dataset.size === key));
    updateHint();
    fit();
  }

  function fit(){
    const s = SIZES[current];
    const availH = window.innerHeight - 200;
    const availW = Math.min(window.innerWidth - 48, 620);
    const sc = Math.min(availW / s.w, availH / s.h, 1);
    scaler.style.width = (s.w * sc) + 'px';
    scaler.style.height = (s.h * sc) + 'px';
    sign.style.transform = 'scale(' + sc + ')';
  }

  document.querySelectorAll('[data-variant]').forEach(b =>
    b.addEventListener('click', () => applyVariant(b.dataset.variant)));
  document.querySelectorAll('[data-size]').forEach(b =>
    b.addEventListener('click', () => applySize(b.dataset.size)));
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  addEventListener('resize', fit);
  applyVariant('order');
  applySize('5x7');
</script>
</body>
</html>
