  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:flex; flex-direction:column; align-items:center; gap:54px;\n    padding:40px 0 64px; border-bottom:1px solid rgba(244,239,227,0.12); }\n  .panel{ display:flex; flex-direction:column; align-items:center; gap:18px; }\n  .tag{ font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:#9c8e78; }\n  .sec{ display:flex; flex-direction:column; gap:8px; }\n  .sechead{ display:flex; align-items:baseline; gap:14px; }\n  .sechead .n{ font-family:'Oswald',sans-serif; font-weight:700; font-size:12px; letter-spacing:0.2em; color:var(--mango); }\n  .sechead h2{ font-family:'Oswald',sans-serif; font-weight:600; font-size:14px; letter-spacing:0.26em;\n    text-transform:uppercase; margin:0; color:var(--cream); }\n  .secsub{ font-family:'Lora',serif; font-style:italic; font-size:14px; color:#9c8e78; margin:0 0 18px; max-width:640px; line-height:1.5; }\n\n  /* color swatches */\n  .swrow{ display:flex; gap:18px; flex-wrap:wrap; }\n  .sw{ width:172px; border-radius:12px; overflow:hidden; border:1px solid rgba(244,239,227,0.1); background:#231d15; }\n  .sw .chipc{ height:104px; display:flex; align-items:flex-start; justify-content:flex-end; padding:10px; }\n  .sw .meta{ padding:12px 14px 14px; }\n  .sw .nm{ font-family:'Zilla Slab',serif; font-weight:700; font-size:16px; color:var(--cream); }\n  .sw .hx{ font-family:'Oswald',sans-serif; font-weight:500; font-size:12px; letter-spacing:0.12em; color:#9c8e78; margin-top:3px; }\n  .sw .role{ font-family:'Lora',serif; font-style:italic; font-size:12.5px; color:#8a7c68; margin-top:7px; line-height:1.4; }\n  .dot{ width:18px; height:18px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.5); }\n\n  /* type rows */\n  .typerow{ display:grid; grid-template-columns:200px 1fr; gap:30px; align-items:center;\n    padding:26px 0; border-bottom:1px solid rgba(244,239,227,0.1); }\n  .typerow .lab{ font-family:'Oswald',sans-serif; font-weight:600; font-size:12px;\n    letter-spacing:0.16em; text-transform:uppercase; color:#9c8e78; }  <div class=\"mh-right\">Wordmark, palette &amp; type<br>v1 · June 2026<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero\">\n    <div class=\"panel\">\n      <div class=\"tag\">Live lockup · exact spec<\u002Fdiv>\n      <div class=\"lock\"><span class=\"c\">Cuppa<\u002Fspan><span class=\"l\">LUMPIA<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"specrow\">\n      <div class=\"chip\"><div class=\"big\">0.46×<\u002Fdiv><div class=\"sm\">Cuppa ÷ Lumpia (font size)<\u002Fdiv><\u002Fdiv>\n      <div class=\"chip\"><div class=\"swatch\">#E7A11D<\u002Fdiv><div class=\"sm\">Cuppa gold (Mango)<\u002Fdiv><\u002Fdiv>\n      <div class=\"chip\"><div class=\"big\" style=\"font-family:'Yellowtail',cursive;color:#E7A11D;\">Cuppa<\u002Fdiv><div class=\"sm\">Yellowtail · −2°<\u002Fdiv><\u002Fdiv>\n      <div class=\"chip\"><div class=\"big\" style=\"font-family:'Zilla Slab',serif;font-weight:700;letter-spacing:0.012em;\">LUMPIA<\u002Fdiv><div class=\"sm\">Zilla Slab · Bold (700)<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec\">\n    <div class=\"sechead\"><span class=\"n\">01<\u002Fspan><h2>Color · Core<\u002Fh2><\u002Fdiv>\n    <p class=\"secsub\">Ink, cream, and kraft do the everyday packaging work.<\u002Fp>\n    <div class=\"swrow\">\n      <div class=\"sw\"><div class=\"chipc\" style=\"background:#161616\"><span class=\"dot\" style=\"background:#161616\"><\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Ink Black<\u002Fdiv><div class=\"hx\">#161616<\u002Fdiv><div class=\"role\">Sticker base, primary text<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chipc\" style=\"background:#F4EFE3\"><span class=\"dot\" style=\"background:#F4EFE3\"><\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Cream<\u002Fdiv><div class=\"hx\">#F4EFE3<\u002Fdiv><div class=\"role\">Reversed text, light surfaces<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chipc\" style=\"background:#B07A4A\"><span class=\"dot\" style=\"background:#B07A4A\"><\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Kraft<\u002Fdiv><div class=\"hx\">#B07A4A<\u002Fdiv><div class=\"role\">Cup &amp; packaging material<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec\">\n    <div class=\"sechead\"><span class=\"n\">02<\u002Fspan><h2>Color · Accent<\u002Fh2><\u002Fdiv>\n    <p class=\"secsub\">Warm Filipino accents for signage, menus, and merch. Mango is the wordmark’s script color.<\u002Fp>\n    <div class=\"swrow\">\n      <div class=\"sw\"><div class=\"chipc\" style=\"background:#3C5A34\"><span class=\"dot\" style=\"background:#3C5A34\"><\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Banana Leaf<\u002Fdiv><div class=\"hx\">#3C5A34<\u002Fdiv><div class=\"role\">Fresh, signage, subheads<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chipc\" style=\"background:#E7A11D\"><span class=\"dot\" style=\"background:#E7A11D\"><\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Mango<\u002Fdiv><div class=\"hx\">#E7A11D<\u002Fdiv><div class=\"role\">Script accent, highlight<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chipc\" style=\"background:#A8431F\"><span class=\"dot\" style=\"background:#A8431F\"><\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"nm\">Rust<\u002Fdiv><div class=\"hx\">#A8431F<\u002Fdiv><div class=\"role\">Sauce, warmth<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec\">\n    <div class=\"sechead\"><span class=\"n\">03<\u002Fspan><h2>Type<\u002Fh2><\u002Fdiv>\n    <p class=\"secsub\">Lumpia anchors the mark; Cuppa is the script accent in Mango; Oswald carries the subheads.<\u002Fp>\n\n    <div class=\"typerow\">\n      <div class=\"lab\">Display · Wordmark<small>Zilla Slab · Bold 700 · +1.2% tracking<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-family:'Zilla Slab',serif;font-weight:700;font-size:64px;letter-spacing:0.012em;color:var(--cream);line-height:0.9;\">Lumpia<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"typerow\">\n      <div class=\"lab\">Script · Accent<small>Yellowtail · Mango · −2°<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-family:'Yellowtail',cursive;font-size:64px;color:var(--mango);transform:rotate(-2deg);transform-origin:left center;\">Cuppa<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"typerow\">\n      <div class=\"lab\">Subhead · Labels<small>Oswald · SemiBold 600 · Banana Leaf · +0.18em<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:21px;letter-spacing:0.18em;text-transform:uppercase;color:var(--leaf);\">EST · 2026 · FILIPINO FAMILY RECIPE<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"typerow\">\n      <div class=\"lab\">Body · Copy<small>Lora · Regular 400 · Cream<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-family:'Lora',serif;font-weight:400;font-size:22px;line-height:1.5;color:var(--cream);max-width:520px;\">Hand-rolled the family way, fried to a shatter, and served hot from the cup.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"colophon\">Cuppa Lumpia · Bainbridge Island · cuppalumpia.com<\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
